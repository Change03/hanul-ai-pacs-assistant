server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        same-site: lax

spring:
  application:
    name: hanul-ai-pacs-backend
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/hanul_pacs}
    username: ${POSTGRES_USER:hanul}
    password: ${POSTGRES_PASSWORD:hanul}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  orthanc:
    base-url: ${ORTHANC_BASE_URL:http://localhost:8042}
    dicomweb-url: ${ORTHANC_DICOMWEB_URL:http://localhost:8042/dicom-web}
    username: ${ORTHANC_USERNAME:orthanc}
    password: ${ORTHANC_PASSWORD:orthanc}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
