services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hanul_pacs}
      MYSQL_USER: ${MYSQL_USER:-hanul}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hanul}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hanul-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  orthanc:
    image: orthancteam/orthanc:latest
    environment:
      ORTHANC__NAME: HanulDemoOrthanc
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: '{"orthanc":"orthanc"}'
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"
      ORTHANC__DICOM_WEB__ENABLE_WADO: "true"
      ORTHANC__DICOM_WEB__WADO_ROOT: "/wado"
      ORTHANC__DICOM_WEB__STUDIES_METADATA: "Full"
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc-data:/var/lib/orthanc/db

  ai-service:
    build:
      context: ./ai-service
    environment:
      MODEL_PATH: /app/models/chest_demo.onnx
      AI_PROVIDER: ${AI_PROVIDER:-DEMO_FALLBACK}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-hanul_pacs}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: ${MYSQL_USER:-hanul}
      DB_PASSWORD: ${MYSQL_PASSWORD:-hanul}
      ORTHANC_BASE_URL: ${ORTHANC_BASE_URL:-http://orthanc:8042}
      ORTHANC_DICOMWEB_URL: ${ORTHANC_DICOMWEB_URL:-http://orthanc:8042/dicom-web}
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-orthanc}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:-orthanc}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      orthanc:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  seed-dicoms:
    build:
      context: ./tools/seed-dicoms
    environment:
      ORTHANC_BASE_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-orthanc}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:-orthanc}
    depends_on:
      - orthanc
    restart: "no"

volumes:
  mysql-data:
  orthanc-data:
