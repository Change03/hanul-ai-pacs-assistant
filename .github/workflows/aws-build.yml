name: EC2 Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/aws-build.yml"
      - "backend/**"
      - "ai-service/**"
      - "web/**"
      - "tools/**"
      - ".env.example"
      - "docker-compose.yml"
  workflow_dispatch:

concurrency:
  group: ec2-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-image-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            repository: backend
          - service: ai-service
            context: ./ai-service
            dockerfile: ./ai-service/Dockerfile
            repository: ai-service
          - service: web
            context: ./web
            dockerfile: ./web/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          provenance: false
          sbom: false
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-ready:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check EC2 deploy secrets
        id: check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
        run: |
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_SSH_KEY" ] && [ -n "$EC2_APP_DIR" ] && [ -n "$EC2_ENV_FILE" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: [docker-image-build, deploy-ready]
    if: ${{ needs.deploy-ready.outputs.ready == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "docker-compose.yml,backend,ai-service,web,tools,.env.example"
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            cat > .env <<'EOF'
            ${{ secrets.EC2_ENV_FILE }}
            EOF
            docker compose up -d --build --remove-orphans
            docker compose ps
